name: Deploy to Vercel Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel production
        run: npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_LFJmXxKy2hfQ4270wtDhG0xz
          VERCEL_PROJECT_ID: prj_IE4W9GbXkTn0wqk9Osh6eTcD3cQ7
